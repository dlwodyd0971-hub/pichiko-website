<!DOCTYPE html>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@4/600.css" />

  <style>
    .booking-page { min-height: 100vh; padding: 120px 5% 80px; background: linear-gradient(140deg, var(--bg), var(--peach)); }
    .booking-container { max-width: 600px; margin: 0 auto; }

    /* 상태 배너 */
    .status-banner {
      padding: 12px 16px;
      border-radius: 2px;
      font-family: var(--fb);
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .status-banner.show { display: block; }
    .status-banner.checking {
      background: #FFF8F0;
      border: 1px solid var(--peach-mid);
      color: var(--muted);
    }
    .status-banner.error {
      background: #FFF2F2;
      border: 1px solid #E85A4A;
      color: #D94040;
    }
    .status-banner.conflict {
      background: #FFF2F2;
      border: 1px solid #E85A4A;
      color: #D94040;
    }

    /* 예약된 슬롯 뱃지 */
    .slots-panel {
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: none;
    }
    .slots-panel.show { display: block; }
    .slots-label {
      font-family: var(--fb);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .slots-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .slot-badge {
      font-family: var(--fb);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--peach);
      color: var(--accent-dk);
      border: 1px solid var(--peach-mid);
    }
    .slot-badge.conflict {
      background: #FFE0E0;
      color: #D94040;
      border-color: #E85A4A;
      font-weight: 600;
    }
    .slots-empty {
      font-family: var(--fb);
      font-size: 13px;
      color: #2E9E5B;
    }

    /* 스피너 */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 7px;
    }

    @media (max-width: 480px) {
      .booking-form { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>

  <header id="header" class="scrolled">
    <div class="logo" style="cursor:pointer;" onclick="goHome()">PICHIKO</div>

      <div class="lang-wrap">
        <button class="lang-toggle" id="langToggle">🇬🇧 EN ▾</button>
        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-opt active" data-lang="EN">🇬🇧 EN</button>
          <button class="lang-opt" data-lang="KO">🇰🇷 KO</button>
          <button class="lang-opt" data-lang="JP">🇯🇵 JP</button>
          <button class="lang-opt" data-lang="ZH">🇨🇳 ZH</button>
        </div>
      </div>
      <button class="btn-ghost" id="backBtn" onclick="goHome()">← Back</button>
    </nav>
  </header>

  <section class="booking-page">
    <div class="booking-container">

      <div class="section-head" style="margin-bottom:36px;">
        <div class="label-sm" id="txt-label">Reservation</div>
        <h2 class="fd" id="txt-title">Complete Your Booking</h2>
        <p class="fb" style="margin-top:10px;color:var(--muted);font-size:14px;" id="txt-subtitle">
          Please provide your details for the perfect K-Beauty experience.
        </p>
      </div>

      <!-- 예약 폼 -->
      <div id="bookingFormWrap">

        <!-- 예약된 시간 현황 패널 -->
        <div class="slots-panel" id="slotsPanel">
          <div class="slots-label" id="txt-slots-label">Booked slots</div>
          <div class="slots-list" id="slotsList"></div>
        </div>

        <!-- 상태 배너 -->
        <div class="status-banner" id="statusBanner"></div>

        <form class="booking-form" id="mainBookingForm"
          style="display:grid;grid-template-columns:1fr 1fr;gap:13px;background:var(--white);border:1px solid var(--border);padding:36px 32px;box-shadow:0 10px 36px rgba(200,100,60,.07);">

          <div class="form-row full">
            <label class="form-label" id="lbl-service">Service Type</label>
            <select id="f-service" required>
              <option value="" id="opt-service-default">Select a service</option>
            </select>
          </div>

          <div class="form-row full">
            <label class="form-label" id="lbl-artist">Preferred Artist</label>
            <select id="f-artist" required>
              <option value="" id="opt-artist-default">Select an artist</option>
            </select>
          </div>

          <div class="form-row">
            <label class="form-label" id="lbl-date">Date</label>
            <input type="date" id="f-date" required />
          </div>

          <div class="form-row">
            <label class="form-label" id="lbl-time">Time</label>
            <input type="time" id="f-time" required />
          </div>

          <div class="form-row full">
            <label class="form-label" id="lbl-hotel">Hotel / Address in Seoul</label>
            <input type="text" id="f-hotel" placeholder="e.g. Lotte Hotel Seoul, Myeongdong" required />
          </div>

          <div class="form-row full">
            <label class="form-label" id="lbl-requests">Additional Requests (Optional)</label>
            <input type="text" id="f-requests" placeholder="e.g. Sensitive skin, specific style..." />
          </div>

          <div class="form-row full" style="margin-top:8px;">
            <button type="submit" class="btn-accent full-btn" id="submitBtn">
              Confirm Booking
            </button>
            <p style="font-family:var(--fb);font-size:11px;color:var(--muted);text-align:center;margin-top:8px;" id="txt-secure">
              🔒 Secured by Firebase
            </p>
          </div>

        </form>
      </div>

      <!-- 완료 화면 -->
      <div class="booking-done hidden" id="successMessage"
        style="background:var(--white);border:1.5px solid var(--peach-mid);padding:52px 32px;text-align:center;">
        <div style="font-size:52px;margin-bottom:20px;">🌸</div>
        <h3 class="fd" id="txt-done-h" style="font-size:28px;margin-bottom:12px;">Booking Confirmed!</h3>
        <p class="fb" id="txt-done-p" style="color:var(--muted);line-height:1.8;margin-bottom:16px;">
          We'll send a confirmation to your email shortly.
        </p>
        <!-- 예약 요약 카드 -->
        <div id="bookingSummary"
          style="background:var(--soft);border:1px solid var(--border);padding:16px 20px;border-radius:2px;text-align:left;margin-bottom:28px;font-family:var(--fb);font-size:13px;">
        </div>
        <button class="btn-ghost" onclick="goHome()" id="txt-done-btn"
          style="padding:12px 28px;font-size:13px;">Back to Home</button>
      </div>

    </div>
  </section>

    let   currentLang = params.get("lang") || "EN";
    if (!BOOK_T[currentLang]) currentLang = "EN";
    const preArtist  = params.get("artist") || "";  // 아티스트 카드에서 넘어온 값

    /* ══════════════════════════════════════

    ══════════════════════════════════════ */
    const LANG_LABELS = { EN:"🇬🇧 EN", KO:"🇰🇷 KO", JP:"🇯🇵 JP", ZH:"🇨🇳 ZH" };

    function applyLang(lang) {
      const t = BOOK_T[lang];
      currentLang = lang;

      // 텍스트 업데이트
      document.getElementById("txt-label").textContent     = t.label;
      document.getElementById("txt-title").textContent     = t.title;
      document.getElementById("txt-subtitle").textContent  = t.subtitle;
      document.getElementById("backBtn").textContent       = t.back;
      document.getElementById("lbl-service").textContent   = t.lbl_service;
      document.getElementById("lbl-artist").textContent    = t.lbl_artist;
      document.getElementById("lbl-date").textContent      = t.lbl_date;
      document.getElementById("lbl-time").textContent      = t.lbl_time;
      document.getElementById("lbl-hotel").textContent     = t.lbl_hotel;
      document.getElementById("lbl-requests").textContent  = t.lbl_requests;
      document.getElementById("submitBtn").textContent     = t.submit;
      document.getElementById("txt-secure").textContent    = t.secure;
      document.getElementById("txt-slots-label").textContent = t.slots_label;
      document.getElementById("txt-done-h").textContent    = t.done_h;
      document.getElementById("txt-done-p").textContent    = t.done_p;
      document.getElementById("txt-done-btn").textContent  = t.done_btn;
      document.getElementById("f-hotel").placeholder       = t.hotel_ph;
      document.getElementById("f-requests").placeholder    = t.requests_ph;

      // 서비스 선택지
      const svcSel = document.getElementById("f-service");
      const prevSvc = svcSel.value;
      svcSel.innerHTML = `<option value="">${t.opt_service}</option>` +
        t.services.map(s => `<option value="${s.v}">${s.l}</option>`).join("");
      if (prevSvc) svcSel.value = prevSvc;

      // 아티스트 선택지
      const artSel = document.getElementById("f-artist");
      const prevArt = artSel.value;
      artSel.innerHTML = `<option value="">${t.opt_artist}</option>` +
        t.artists.map(a => `<option value="${a.v}">${a.l}</option>`).join("");
      // URL로 넘어온 아티스트 또는 이전 선택값 복원
      if (preArtist && !prevArt) {
        artSel.value = preArtist.toLowerCase();
      } else if (prevArt) {
        artSel.value = prevArt;
      }

      // 언어 토글 버튼
      document.getElementById("langToggle").textContent = LANG_LABELS[lang] + " ▾";
      document.querySelectorAll(".lang-opt").forEach(b =>
        b.classList.toggle("active", b.dataset.lang === lang)
      );

    let currentUserEmail = "";

    /* ══════════════════════════════════════

    ══════════════════════════════════════ */
    async function loadBookedSlots(artist, date) {
      const panel = document.getElementById("slotsPanel");
      const list  = document.getElementById("slotsList");
      if (!artist || !date) { panel.classList.remove("show"); return; }

      try {
        const q = query(
          collection(db, "bookings"),
          where("artist", "==", artist),
          where("reservationDate", "==", date)
        );
        const snap = await getDocs(q);
        const bookedTimes = snap.docs.map(d => d.data().reservationTime).sort();

        panel.classList.add("show");

        if (bookedTimes.length === 0) {
          list.innerHTML = `<span class="slots-empty">${BOOK_T[currentLang].slots_empty}</span>`;
        } else {
          const currentTime = document.getElementById("f-time").value;
          list.innerHTML = bookedTimes.map(t => {
            const isConflict = t === currentTime;
            return `<span class="slot-badge${isConflict ? " conflict" : ""}">${isConflict ? "✗ " : ""}${t}</span>`;
          }).join("");
        }
      } catch (e) {
        panel.classList.remove("show");
      }
    }

    ["f-artist", "f-date"].forEach(id => {
      document.getElementById(id).addEventListener("change", () => {
        const artist = document.getElementById("f-artist").value;
        const date   = document.getElementById("f-date").value;
        loadBookedSlots(artist, date);
        hideBanner();
      });
    });

    document.getElementById("f-time").addEventListener("change", () => {
      const artist = document.getElementById("f-artist").value;
      const date   = document.getElementById("f-date").value;
      if (artist && date) loadBookedSlots(artist, date);
      hideBanner();
    });
